services:
  - type: web
    name: order-to-cash-mcp
    runtime: docker
    dockerfilePath: ./mcp-server/Dockerfile
    dockerContext: ./mcp-server
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: order-to-cash-mcp-db
          property: connectionString
      - key: MCP_API_KEY
        sync: false

databases:
  - name: order-to-cash-mcp-db
    plan: free
